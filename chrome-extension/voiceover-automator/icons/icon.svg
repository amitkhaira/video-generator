<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background pill -->
  <rect width="128" height="128" rx="26" fill="#15151f"/>

  <!-- Microphone body -->
  <rect x="44" y="10" width="40" height="68" rx="20" fill="#4285f4"/>

  <!-- Mic grille lines -->
  <line x1="44" y1="36" x2="84" y2="36" stroke="#1a3a6e" stroke-width="2.5"/>
  <line x1="44" y1="46" x2="84" y2="46" stroke="#1a3a6e" stroke-width="2.5"/>
  <line x1="44" y1="56" x2="84" y2="56" stroke="#1a3a6e" stroke-width="2.5"/>

  <!-- Stand arc -->
  <path d="M22 68 C22 104 106 104 106 68"
        stroke="#8ab4f8" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Vertical post -->
  <line x1="64" y1="102" x2="64" y2="118"
        stroke="#8ab4f8" stroke-width="8" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="40" y1="118" x2="88" y2="118"
        stroke="#8ab4f8" stroke-width="8" stroke-linecap="round"/>

  <!-- Left waveform bar -->
  <rect x="10" y="50" width="7" height="28" rx="3.5" fill="#4285f4" opacity="0.6"/>

  <!-- Right waveform bar -->
  <rect x="111" y="50" width="7" height="28" rx="3.5" fill="#4285f4" opacity="0.6"/>
</svg>
